name: bcproxyai
services:
  bcproxyai:
    image: bcproxyai
    build: .
    ports:
      - "3334:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://bcproxy:bcproxy@postgres:5432/bcproxyai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bcproxyai-data:/app/data

  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: bcproxy
      POSTGRES_PASSWORD: bcproxy
      POSTGRES_DB: bcproxyai
    volumes:
      - bcproxyai-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcproxy -d bcproxyai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - bcproxyai-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bcproxyai-data:
  bcproxyai-pg:
  bcproxyai-redis:
