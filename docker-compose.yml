name: bcproxyai
services:
  bcproxyai:
    image: bcproxyai
    build: .
    expose:
      - "3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://bcproxy:bcproxy@postgres:5432/bcproxyai
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bcproxyai-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    ports:
      - "3334:80"
    volumes:
      - ./caddy-docker.Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      bcproxyai:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: bcproxy
      POSTGRES_PASSWORD: bcproxy
      POSTGRES_DB: bcproxyai
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    volumes:
      - bcproxyai-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcproxy -d bcproxyai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru", "--appendonly", "yes"]
    volumes:
      - bcproxyai-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bcproxyai-data:
  bcproxyai-pg:
  bcproxyai-redis:
